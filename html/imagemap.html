<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imageMap</title>
</head>
<body>
    <h1>map image</h1>
    <h2><figure><picture><source srcset="../img/ruins.webp" type="image/webp">
    <!-- Image Map Generated by http://www.image-map.net/ -->
<img src="ruins.jpg" usemap="#image-map" alt="a greyscale image of ruined arches">

    </picture>
    <figcaption>the ruins, CC, Gabe, image used:
    <br>Stone Walls with Arches: https://www.pexels.com/photo/stone-walls-with-arches-12680151/
    </figcaption>
</figure></h2>
    <map name="image-map">
    <area target="" alt="ruins" title="ruins" href="https://www.pexels.com/license/" coords="98,231,179,297" shape="rect">
    <area target="" alt="tunnel" title="tunnel" href="https://www.pexels.com/license/" coords="423,461,58" shape="circle">
    <area target="" alt="bush" title="bush" href="https://www.pexels.com/license/" coords="205,113,230,30,290,1,408,7,412,59,384,85,386,114" shape="poly"></map>

</html>
